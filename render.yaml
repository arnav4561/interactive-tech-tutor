services:
  - type: web
    name: interactive-tech-tutor-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGINS
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_BEDROCK_REGION
        value: us-west-2
      - key: DYNAMODB_TABLE_PREFIX
        value: itt
      - key: AWS_S3_BUCKET
        value: interactive-tech-tutor-cache
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
